<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="An infinite, AI-driven choose-your-own-adventure engine with real-time image generation and dynamic inventory tracking." />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3408/3408506.png" />
    <title>Chronicles of Infinity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Orbitron:wght@400;700&family=Rajdhani:wght@400;700&family=Creepster&display=swap" rel="stylesheet">
    <style>
      html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        margin: 0;
        padding: 0;
        overscroll-behavior: none;
      }
      body {
        font-family: 'Lato', sans-serif;
        background-color: var(--theme-bg, #0f172a);
        color: var(--theme-text, #e2e8f0);
        transition: background-color 1s ease, color 1s ease;
      }
      h1, h2, h3 {
        /* Font family is handled by tailwind classes now */
      }
      .story-text {
        font-family: 'Merriweather', serif;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--theme-surface, #1e293b); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--theme-border, #475569); 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--theme-muted, #64748b); 
      }

      /* --- Environmental Effects --- */
      
      /* Rain */
      .weather-rain {
        background-image: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.4));
        background-size: 1px 50px;
        position: absolute;
        top: -50px;
        left: 0;
        width: 100%;
        height: 100%;
        animation: rain 0.6s linear infinite;
        opacity: 0.3;
        pointer-events: none;
      }
      @keyframes rain {
        0% { transform: translateY(0); }
        100% { transform: translateY(100vh); }
      }

      /* Snow */
      .weather-snow {
        position: absolute;
        top: -10px;
        width: 6px;
        height: 6px;
        background: white;
        border-radius: 50%;
        opacity: 0.8;
        animation: snow 5s linear infinite;
        filter: blur(1px);
      }
      @keyframes snow {
        0% { transform: translateY(0) translateX(0); opacity: 0.8; }
        100% { transform: translateY(100vh) translateX(20px); opacity: 0; }
      }

      /* Fog */
      .weather-fog {
        position: absolute;
        width: 200%;
        height: 100%;
        background: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png') repeat-x;
        background-size: contain;
        animation: fog 60s linear infinite;
        opacity: 0.3;
        pointer-events: none;
      }
      @keyframes fog {
        0% { transform: translate3d(0, 0, 0); }
        100% { transform: translate3d(-50%, 0, 0); }
      }

      /* Flicker / Strobe */
      .weather-flicker {
        animation: flicker 0.1s infinite alternate;
        background-color: rgba(0,0,0,0.3);
      }
      @keyframes flicker {
        0% { opacity: 0.1; }
        100% { opacity: 0.4; }
      }

      /* Embers/Ash */
      .weather-ember {
        position: absolute;
        bottom: -10px;
        width: 4px;
        height: 4px;
        background: #ff4500;
        border-radius: 50%;
        box-shadow: 0 0 4px #ff4500;
        animation: ember 4s linear infinite;
        opacity: 0;
      }
      @keyframes ember {
        0% { transform: translateY(0) translateX(0); opacity: 1; }
        100% { transform: translateY(-80vh) translateX(-20px); opacity: 0; }
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              theme: {
                bg: 'var(--theme-bg)',
                surface: 'var(--theme-surface)',
                'surface-highlight': 'var(--theme-surface-highlight)',
                border: 'var(--theme-border)',
                primary: 'var(--theme-primary)',
                'primary-hover': 'var(--theme-primary-hover)',
                text: 'var(--theme-text)',
                muted: 'var(--theme-muted)',
              }
            },
            fontFamily: {
              fantasy: ['Cinzel', 'serif'],
              scifi: ['Orbitron', 'sans-serif'],
              horror: ['Creepster', 'cursive'],
              cyberpunk: ['Rajdhani', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.8s ease-out',
              'fade-in-up': 'fadeInUp 0.8s ease-out',
              'slide-in': 'slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideIn: {
                '0%': { opacity: '0', transform: 'translateY(30px) scale(0.98)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              }
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "openai": "https://aistudiocdn.com/openai@^4.60.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
