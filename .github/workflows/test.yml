name: Test

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check type escapes
        run: pnpm run type-escapes:check
        continue-on-error: true

      - name: Type check
        run: pnpm typecheck

      - name: Run stable tests
        run: pnpm run test:stable -- --testTimeout=20000

      - name: Generate stable coverage summary
        run: pnpm run test:cov:stable -- --testTimeout=20000
        continue-on-error: true

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          if-no-files-found: warn
